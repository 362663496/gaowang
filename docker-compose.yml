services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gaowang}
      POSTGRES_USER: ${POSTGRES_USER:-gaowang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./apps/api
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads:
  backups:
