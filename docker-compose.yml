services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gaowang}
      POSTGRES_USER: ${POSTGRES_USER:-gaowang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gaowang} -d ${POSTGRES_DB:-gaowang}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
    environment:
      API_PROXY_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: /api/v1
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/uploads:ro
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres_data:
  uploads:
  backups:
